<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VidScan Web Benchmark</title>
    <style>
      body {
        font-family: monospace;
        background: #111111;
        color: #00ff00;
        padding: 20px;
      }
      input,
      button {
        background: #1a1a1a;
        color: #00ff00;
        border: 1px solid #00ff00;
        padding: 10px;
        margin: 10px 0;
      }
      input[type="file"]:hover,
      button:hover {
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
      }
      #log {
        white-space: pre-wrap;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1 style="font-size: 36px">VIDSCAN WEB BENCHMARK</h1>
    <br />

    <label>Select test folder: </label>
    <input type="file" id="dirPicker" webkitdirectory directory multiple />
    <br />

    <label>Native concurrent limit: </label>
    <input type="number" id="concurrentInput" value="1" min="1" max="50" />
    &nbsp;

    <button id="runBtn" disabled>Run Benchmark</button>

    <div id="log"></div>

    <script>
      const els = {
        dirPicker: document.getElementById("dirPicker"),
        runBtn: document.getElementById("runBtn"),
        concurrentInput: document.getElementById("concurrentInput"),
        log: document.getElementById("log"),
      };

      let targetFiles = [];

      function logger(msg) {
        els.log.innerText += msg + "\n";
        console.log(msg);
      }

      els.dirPicker.addEventListener("change", (e) => {
        targetFiles = Array.from(e.target.files).filter((f) =>
          f.name.match(/\.(mp4|webm|mov|m4v)$/i),
        );
        logger(`Native video files: ${targetFiles.length}`);
        els.runBtn.disabled = false;
      });

      function getNativeDuration(file) {
        return new Promise((resolve, reject) => {
          const video = document.createElement("video");
          video.preload = "metadata";

          const objectUrl = URL.createObjectURL(file);

          const cleanup = () => {
            video.removeAttribute("src");
            video.load();
            URL.revokeObjectURL(objectUrl);
          };

          video.onloadedmetadata = () => {
            const duration = video.duration;
            cleanup();
            resolve(duration);
          };

          video.onerror = () => {
            cleanup();
            reject(new Error(`Failed for native file: ${file.name}`));
          };

          video.src = objectUrl;
        });
      }

      async function runQueue(files, concurrencyLimit, processCallback) {
        let index = 0;
        const workers = [];

        let successCount = 0;
        let failCount = 0;

        const worker = async () => {
          while (index < files.length) {
            const file = files[index++];
            try {
              await processCallback(file);
              successCount++;
            } catch (e) {
              failCount++;
            }
          }
        };

        for (let i = 0; i < concurrencyLimit; i++) {
          workers.push(worker());
        }

        await Promise.all(workers);

        return { successCount, failCount };
      }

      els.runBtn.addEventListener("click", async () => {
        const nativeConcurrent = parseInt(els.concurrentInput.value, 10);
        logger("\n----------------------------------------------");
        logger(
          `STARTING BENCHMARK: Native Concurrent Limit ${nativeConcurrent}`,
        );
        els.runBtn.disabled = true;

        const startTime = performance.now();

        const results = await runQueue(
          targetFiles,
          nativeConcurrent,
          getNativeDuration,
        );

        const endTime = performance.now();
        const totalMs = endTime - startTime;

        logger(`Time: ${(totalMs / 1000).toFixed(2)} seconds`);
        logger(`Successful: ${results.successCount}`);
        logger(`Failed: ${results.failCount}`);
        logger(
          `Speed: ${(results.successCount / (totalMs / 1000)).toFixed(2)} successful files / second`,
        );
        logger(`BENCHMARK COMPLETE`);
        logger("----------------------------------------------\n");

        els.runBtn.disabled = false;
      });
    </script>
  </body>
</html>
